name: KBS

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-kbs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Decode and run KBS script
        env:
          KBS_PY: ${{ secrets.KBS_PY }}
        run: |
          echo "$KBS_PY" | base64 -d > kbs_fetcher.py
          python kbs_fetcher.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add channel_code.txt kbs-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update KBS data [skip ci]"
          git push
